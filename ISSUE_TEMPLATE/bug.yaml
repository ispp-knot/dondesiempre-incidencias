name: Bug
description: Reporta un error
labels: [Bug]
projects: [ispp-knot/3]

body:
  - type: textarea
    id: description
    attributes:
      label: Descripción
      description: Explica brevemente el problema
      placeholder: "Ej: Al hacer login la app se queda cargando"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Cómo reproducir el error
      placeholder: "1. Ir a...\n2. Hacer...\n3. Ver error"
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado vs Resultado actual
      placeholder: "Qué debería pasar"
    validations:
      required: false
      
  - type: textarea
    id: fotos
    attributes:
      label: Capturas de pantalla
      description: Capturas de pantalla.
      placeholder: "Opcional"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Información adicional
      description: Logs, entorno, etc.
      placeholder: "Opcional"
    validations:
      required: false
